name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake g++ \
            libomp-dev libcurl4-openssl-dev \
            python3 python3-pip

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload terllama binary
        uses: actions/upload-artifact@v4
        with:
          name: terllama-${{ github.sha }}
          path: build/terllama
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            arch: x86_64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            arch: aarch64
          - os: macos-latest
            target: darwin-amd64
            arch: x86_64
          - os: macos-latest
            target: darwin-arm64
            arch: arm64
          - os: windows-latest
            target: windows-amd64
            arch: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake g++ libomp-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake libomp

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build -j$(nproc) --target terllama

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/terllama.exe terllama-${{ matrix.target }}.exe
          else
            cp build/terllama terllama-${{ matrix.target }}
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: terllama-${{ matrix.target }}
          path: terllama-${{ matrix.target }}*

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
