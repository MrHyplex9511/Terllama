name: Desktop Release
on:
  push:
    tags: ['desktop-v*']
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: AppImage
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: msi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build
        run: |
          cd terllama-desktop
          pnpm install
          pnpm tauri build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: terllama-desktop-${{ matrix.target }}
          path: terllama-desktop/src-tauri/target/release/bundle/*
  publish:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          files: terllama-desktop/**/bundle/**
          generate_release_notes: true
